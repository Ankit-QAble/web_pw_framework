baseURL: 'https://google.com'
browser: 'chrome' # 'chrome'|'chromium'|'firefox'|'webkit'
headless: false
parallel: 1 # workers
retries: 0
screenshot: 'on'
video: 'on' # 'on', 'off', 'retain-on-failure', 'on-first-retry'
elementHighlight: true
mobile:
  mobile:
    isMobile: false
    device: 'pixel 7'
    # viewportWidth: 875
    # viewportHeight: 667
    # Or use a device name instead: device: 'pixel 7'
reportEmail:
  email: false # Set to true to enable email reporting
  to: ['${EMAIL_TO_DEV}']
  subject: 'Automation Test Report'
  body: 'Test execution completed for development environment'
reportSmtp:
  smtp: true
  host: '${SMTP_HOST:-smtp.gmail.com}'
  port: ${SMTP_PORT:-587}
  auth:
    user: '${SMTP_USER}'
    pass: '${SMTP_PASS}'
grid:
  isGrid: false
  provider: 'lambdatest' # 'lambdatest' | 'browserstack'
  
  # LambdaTest Configuration
  lambdatest:
    user: '${LAMBDA_USER}'
    key: '${LAMBDA_KEY}'
    capabilities:
      LT:Options:
        platform: 'Windows 10'
        browserName: 'Chrome'
        browserVersion: 'latest'
        resolution: '1920x1080'
        name: 'Playwright Login Tests'
        build: 'Login Test'
        projectName: 'Web Framework'
        console: true
        network: true
        visual: true
        video: true
  
  # BrowserStack Configuration
  browserstack:
    user: '${BROWSERSTACK_USER}'
    key: '${BROWSERSTACK_KEY}'
    capabilities:
      bstack:options:
        os: 'Windows'
        osVersion: '10'
        browserName: 'chrome'
        browserVersion: 'latest'
        resolution: '1920x1080'
        projectName: 'Web Framework'
        buildName: 'Development Build'
        sessionName: 'Playwright Development Tests'
        local: false
        networkLogs: true
        consoleLogs: 'info'
        video: true
